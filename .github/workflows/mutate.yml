---

name: Mutation Testing
permissions:
  contents: read

# on: [push, pull_request]
on:
  schedule:
    - cron: '12 23 26 * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutate:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: shogo82148/actions-setup-perl@v1

      - run: cpanm --skip-satisfied --installdeps .
      - run: prove -l t/

      - run: echo "$(pwd)/local/bin" >> $GITHUB_PATH

      - run: |
          perl Makefile.PL
          make install

      - run: perl -Ilib -Iblib/lib bin/test-generator-mutate \
         --lib lib \
         --json mutation.json \
         --changed_only \
         --html mutation_html
