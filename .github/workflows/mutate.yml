---

name: Mutation Testing
permissions:
  contents: read

# on: [push, pull_request]
on:
  schedule:
    - cron: '12 23 26 * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutate:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: shogo82148/actions-setup-perl@v1

      - run: cpanm --skip-satisfied --installdeps .
      - run: prove -l t/

      - run: echo "$(pwd)/local/bin" >> $GITHUB_PATH

      - run: |
          perl Makefile.PL
          make install

      - run: |
          echo "=== git diff HEAD~1 HEAD ==="
          git diff --name-only HEAD~1 HEAD
          echo "=== git log -5 ==="
          git log --oneline -5

      - name: Genenate the mutants
        env:
          AUTOMATED_TESTING: 1
          NO_NETWORK_TESTING: 1
          NONINTERACTIVE_TESTING: 1
        run: perl -Ilib -Iblib/lib bin/test-generator-mutate \
         --lib lib \
         --json mutation.json \
         --changed_only \
         --mutation_level fast \
         --html mutation_html
